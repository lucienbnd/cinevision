name: CI / CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Évite de lancer plusieurs workflows en parallèle pour la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1 : Lint Python (catch les vraies erreurs uniquement)
  # ============================================================
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (errors only)
        # On ne sélectionne que les vraies erreurs (pyflakes + syntaxe),
        # pas les warnings de style — projet académique, on reste pragmatique
        run: ruff check src/ app/ --select F,E9 --output-format=github

  # ============================================================
  # JOB 2 : Smoke test — l'image Docker se build correctement ?
  # ============================================================
  smoke-test:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cinevision:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3 : Deploy — uniquement sur push to main
  # ============================================================
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /opt/cinevision
            echo "=== Pull latest main ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== Rebuild & restart container ==="
            docker compose up -d --build
            echo "=== Cleanup old images ==="
            docker image prune -af
            echo "=== Final status ==="
            docker compose ps
